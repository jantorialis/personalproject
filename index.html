<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content=""width=device-width, initial scale="1.0, maximum-scale=1.0, viewport-fit=contain">
        <title>entrance</title>
        <link rel="icon" href="/favicon.ico" type="image/x-icon">
        <style>
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                font-family: 'Times New Roman', Times, serif;
            }

            .entrance-page { 
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: url('assets/sky.png');
                background-size: cover;
                background-position: center;
            }

            .entrance-message {
                position: absolute;
                top: 50%;
                left: 10%;
                transform: translateY(-50%);
                z-index: 20;
                text-align: left;
                max-width: 600px;
            }

            .entrance-title {
                font-size: 5rem;
                color: #000080;
                margin: 0;
                line-height: 1.1;
                letter-spacing: 2px;
                font-weight: bold;
            }

            .entrance-subtitle {
                font-size: 2rem;
                color: #000080;
                margin: 10px 0 20px 0;
                font-style: italic;
            }

            .entrance-instruction {
                font-size: 1.5rem;
                color: #000080;
                margin: 0;
                border-bottom: 1px dotted #000080;
                display: inline-block;
                padding-bottom: 5px;
            }

            #spin-container {
                position: absolute;
                bottom: 5%;
                right: 5%;
                width: 600px;
                height: 600px;
                max-width: 50vw;
                max-height: 50vw;
                z-index: 30;
                cursor: pointer;
            }

            #spin-canvas {
                width: 100%;
                height: 100%;
                display: block;
            }

            @media screen {
                .entrance-title { 
                    font-size: 3rem;
                }
                .entrance-subtitle {
                    font-size: 1.5rem;
                }
                .entrance-instruction {
                    left: 5%;
                    right: 5%;
                    text-align: center;
                }
                #spin-container {
                    width: 400px;
                    height: 400px;
                }
            }

            @media screen {
                .entrance-title {
                    font-size: 2.2rem;
                }
                #spin-container {
                    width: 250px;
                    height: 250px;
                    bottom: 10%;
                    right: 50%;
                    translate: translateX(50%);
                }
            }
        </style>

    </head>
    <body>
        <div class="entrance-page">
            <div class="entrance-message">
                <h1 class="entrance-title">entrance</h1>
                <p class="entrance-subtitle">love letter to the sky</p>
                <p class="entrance-instruction">click the weathervane to enter</p>
            </div>

            <div id="spin-container" onclick="window.location.href='/main.html'">
                <canvas id="spin-canvas"></canvas>
            </div>
        </div>

        <script type="importmap">
            { 
                "imports":{ 
                    "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
                }
            }
        </script>

        <script type="module">
            import * as THREE from 'three';

            const canvas = document.getElementById('spin-canvas');
            const container = document.getElementById('spin-container')

            const scene = new THREE.Scene();
            scene.background = null;

            const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
            camera.position.z = 3

            const renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                alpha: true,
                antialias: true
            });
            renderer.setClearColor(0x000000, 0);
            renderer.setSize(container.clientWidth, container.clientHeight);

            const textureLoader = new THREE.TextureLoader();

            textureLoader.load(
                'assets/weathervane.png',
                (texture) => {
                    texture.premultiplyAlpha = true;

                    const material = new THREE.MeshBasicMaterial({
                        map: texture,
                        transparent: true,
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });

                    const geometry = new THREE.PlaneGeometry(2.8, 4);
                    const plane = new THREE.Mesh(geometry, material);

                    scene.add(plane);

                    animate();
                },
                undefined,
                (err) => {
                    console.log('error loading image');

                    const canvas = document.createElement('canvas');
                    canvas.width = 512;
                    canvas.height = 512;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#000080';
                    ctx.font = 'bold 120px Times New Roman';
                    ctx.fillText('✦', 200, 300);

                    const fallbackTexture = new THREE.CanvasTexture(canvas);
                    const material = new THREE.MeshBasicMterial({
                        map: fallbackTexture,
                        transparent: true,
                        side: THREE.DoubleSide
                    });

                    const geometry = new THREE.PlaneGeometry(2.8, 2.8);
                    const plane = new THREE.Mesh(geometry, material);

                    scene.add(plane);

                    animate();
                }
            );

            function animate() {
                requestAnimationFrame(animate);

                if (scene.children[0]){
                    scene.children[0].rotation.y+=0.015;
                }

                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                const width = container.clientWidth;
                const height = container.clientHeight;

                if (width > 0 && height > 0) {
                    renderer.setSize(width, height);
                    camera.aspect = width / height;
                    camera.updateProjectionMatrix ();
                }
            });

            setTimeout(() => {
                const width = container.clientWidth;
                const height = container.clientHeight;
                if (width > 0 && height > 0) {
                    renderer.setSize(width, height);
                    camera.aspect = width / height; 
                    camera.updateProjectionMatrix();
                }
            }, 100);
        </script>
    </body>
</html>
